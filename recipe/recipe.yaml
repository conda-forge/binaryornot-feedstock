# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.0"
  python_check_max: "3.14"

package:
  name: binaryornot
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/binaryornot/binaryornot-${{ version }}.tar.gz
  sha256: dcacb1343219da5fbbb7828a46b946768c6df07b65453195954cbbecf14c1c83

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: binaryornot
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest-cov
        - hypothesis
    script:
      - python -c "import binaryornot; assert binaryornot.__version__ == '${{ version }}'"
      - coverage run --source=binaryornot --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=100

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Ultra-lightweight pure Python package to check if a file is binary or text.
  homepage: https://pypi.org/project/binaryornot
  repository: https://github.com/audreyr/binaryornot

extra:
  recipe-maintainers:
    - bollwyvl
